<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AnimeGANv3 WebGPU Mobile Tester</title>
<style>
  :root{color-scheme:dark;}
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#0f1115;color:#e8e8ec;padding:14px;padding-bottom:60px;
  }
  h1{font-size:18px;margin:0 0 4px;}
  p.sub{color:#9a9aa5;font-size:13px;margin:0 0 16px;}
  .card{
    background:#181b22;border:1px solid #262a33;border-radius:14px;
    padding:14px;margin-bottom:14px;
  }
  label{display:block;font-size:13px;color:#b6b6c0;margin-bottom:6px;font-weight:600;}
  input[type=file]{
    width:100%;font-size:13px;color:#cfcfd6;margin-top:8px;
  }
  select{
    width:100%;padding:10px;border-radius:10px;background:#11131a;color:#fff;
    border:1px solid #2c303a;font-size:15px;margin-bottom:8px;
  }
  button{
    width:100%;padding:13px;border:none;border-radius:12px;
    font-size:15px;font-weight:700;margin-top:10px;cursor:pointer;
  }
  .btn-primary{background:#5b8def;color:#fff;}
  .btn-primary:disabled{background:#2c303a;color:#777;}
  .btn-secondary{background:#262a33;color:#e8e8ec;}
  .row{display:flex;gap:10px;}
  .row>div{flex:1;}
  .imgwrap{
    display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;
  }
  .imgbox{flex:1;min-width:140px;}
  .imgbox span{display:block;font-size:11px;color:#9a9aa5;margin-bottom:4px;}
  .imgbox canvas, .imgbox img, .imgbox video{
    width:100%;border-radius:10px;background:#000;display:block;
  }
  #log{
    background:#0b0c10;border:1px solid #262a33;border-radius:10px;
    padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:11px;
    color:#8fd19e;white-space:pre-wrap;max-height:160px;overflow-y:auto;
  }
  .status{font-size:12px;color:#f0c674;margin-top:8px;min-height:16px;}
  .badge{
    display:inline-block;background:#262a33;color:#9a9aa5;font-size:11px;
    padding:3px 8px;border-radius:6px;margin-left:6px;
  }
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;margin-right:6px;margin-top:6px;}
  .ok{background:#1d3a2a;color:#7fdb9a;}
  .err{background:#3a1d1d;color:#db7f7f;}
</style>
</head>
<body>

<h1>🎨 AnimeGANv3 WebGPU Mobile Tester</h1>
<p class="sub">Hardware-accelerated anime filters running 100% on-device.</p>

<div class="card">
  <label>1. Select AnimeGANv3 Model Style</label>
  <select id="modelSelect">
    <option value="" selected disabled>-- Choose an Art Style --</option>
    <option value="https://cors-anywhere.herokuapp.com/https://github.com/TachibanaYoshino/AnimeGANv3/releases/download/v1.1.0/AnimeGANv3_Hayao_36.onnx">🎬 Studio Ghibli (Hayao Style)</option>
    <option value="https://cors-anywhere.herokuapp.com/https://github.com/TachibanaYoshino/AnimeGANv3/releases/download/v1.1.0/AnimeGANv3_Shinkai_37.onnx">🌌 Makoto Shinkai Style</option>
    <option value="https://cors-anywhere.herokuapp.com/https://github.com/TachibanaYoshino/AnimeGANv3/releases/download/v1.1.0/AnimeGANv3_Arcane.onnx">🎨 Arcane (Oil Paint Style)</option>
    <option value="https://cors-anywhere.herokuapp.com/https://github.com/TachibanaYoshino/AnimeGANv3/releases/download/v1.1.0/AnimeGANv3_Disney_v1.0.onnx">🏰 Classic Disney Style</option>
    <option value="https://cors-anywhere.herokuapp.com/https://github.com/TachibanaYoshino/AnimeGANv3/releases/download/v1.1.0/AnimeGANv3_PortraitSketch.onnx">✏️ Monochrome Sketch Style</option>
    <option value="local">📁 Upload Local .onnx File...</option>
  </select>
  
  <div id="localFileWrapper" style="display:none;">
    <input type="file" id="modelFile" accept=".onnx">
  </div>
  <div class="status" id="modelStatus">Select a style or upload a file above.</div>
</div>

<div class="card">
  <label>2. Input image</label>
  <div class="row">
    <div><button class="btn-secondary" id="btnCamera">📷 Use Camera</button></div>
    <div><input type="file" id="imageFile" accept="image/*" style="display:none" capture="environment"></div>
  </div>
  <button class="btn-secondary" id="btnPickPhoto" style="margin-top:8px;">🖼️ Pick Photo from Gallery</button>
  <video id="video" autoplay playsinline style="width:100%;border-radius:10px;margin-top:10px;display:none;"></video>
  <button class="btn-secondary" id="btnSnap" style="display:none;">Capture Frame</button>
</div>

<div class="card">
  <label>3. Inference settings</label>
  <select id="sizeSelect">
    <option value="auto">Auto-detect from model</option>
    <option value="256">256 x 256 (Ultra Fast)</option>
    <option value="512" selected>512 x 512 (Recommended Quality)</option>
  </select>
  <button class="btn-primary" id="btnRun" disabled>▶ Run Inference</button>
  <div class="status" id="runStatus"></div>
</div>

<div class="card">
  <label>Result</label>
  <div class="imgwrap">
    <div class="imgbox">
      <span>Input</span>
      <canvas id="inCanvas"></canvas>
    </div>
    <div class="imgbox">
      <span>Output</span>
      <canvas id="outCanvas"></canvas>
    </div>
  </div>
</div>

<div class="card">
  <label>Debug Log</label>
  <div id="log">Waiting...</div>
</div>

<!-- WebGPU Accelerated ONNX Runtime Engine -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.0/dist/ort.webgpu.min.js"></script>
<script>
const logEl = document.getElementById('log');
function log(msg){
  const t = new Date().toLocaleTimeString();
  logEl.textContent += `\n[${t}] ${msg}`;
  logEl.scrollTop = logEl.scrollHeight;
  console.log(msg);
}

ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.0/dist/";
ort.env.wasm.numThreads = 1; 

let session = null;
let inputName = null;
let outputName = null;
let currentImageEl = null; 
let detected = { layout: null, size: null }; 

async function detectModelShape(session, inputName){
  try{
    const dummy = new ort.Tensor('float32', new Float32Array(1*3*64*64), [1,3,64,64]);
    await session.run({ [inputName]: dummy });
    return { layout: null, size: null };
  }catch(err){
    const matches = [...err.message.matchAll(/index:\s*(\d+)\s*Got:\s*\d+\s*Expected:\s*(\d+)/g)];
    if(matches.length === 0) return { layout: null, size: null };
    const expected = {};
    for(const m of matches){ expected[parseInt(m[1])] = parseInt(m[2]); }

    if(expected[1] === 3) return { layout: 'NCHW', size: expected[2] || expected[3] };
    if(expected[3] === 3) return { layout: 'NHWC', size: expected[1] || expected[2] };
    if(expected[2] !== undefined && expected[3] !== undefined && expected[1] === undefined) return { layout: 'NCHW', size: expected[2] };
    if(expected[1] !== undefined && expected[2] !== undefined && expected[3] === undefined) return { layout: 'NHWC', size: expected[1] };
    return { layout: null, size: null };
  }
}

const modelSelect = document.getElementById('modelSelect');
const localFileWrapper = document.getElementById('localFileWrapper');
const modelFile = document.getElementById('modelFile');
const modelStatus = document.getElementById('modelStatus');
const imageFile = document.getElementById('imageFile');
const btnPickPhoto = document.getElementById('btnPickPhoto');
const btnCamera = document.getElementById('btnCamera');
const btnSnap = document.getElementById('btnSnap');
const video = document.getElementById('video');
const inCanvas = document.getElementById('inCanvas');
const outCanvas = document.getElementById('outCanvas');
const btnRun = document.getElementById('btnRun');
const runStatus = document.getElementById('runStatus');
const sizeSelect = document.getElementById('sizeSelect');

function maybeEnableRun(){
  btnRun.disabled = !(session && currentImageEl);
}

modelSelect.addEventListener('change', async () => {
  const val = modelSelect.value;
  if (val === 'local') {
    localFileWrapper.style.display = 'block';
    modelStatus.textContent = 'Awaiting local file selection...';
  } else if (val) {
    localFileWrapper.style.display = 'none';
    await loadModelFromUrl(val);
  }
});

async function loadModelFromUrl(url) {
  modelStatus.textContent = `Downloading selected art style...`;
  log(`Downloading model from proxy pipeline...`);
  try {
    const response = await fetch(url);
    if (!response.ok) throw new Error(`HTTP status ${response.status}`);
    const buf = await response.arrayBuffer();
    await initORT(buf, "Remote URL Model");
  } catch(err) {
    modelStatus.innerHTML = '<span style="color:#db7f7f;">Download blocked by browser CORS policy. Please download the file below and upload manually.</span>';
    log('ERROR: ' + err.message);
  }
}

modelFile.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  modelStatus.textContent = `Compiling ${file.name}...`;
  try{
    const buf = await file.arrayBuffer();
    await initORT(buf, file.name);
  }catch(err){
    modelStatus.textContent = 'Compilation failed.';
    log('ERROR compiling model: ' + err.message);
  }
});

async function initORT(buffer, name) {
  log('Initializing WebGPU hardware acceleration engine...');
  try {
    session = await ort.InferenceSession.create(buffer, { executionProviders: ['webgpu'] });
    log('Success: WebGPU acceleration active.');
  } catch (gpuError) {
    log(`WebGPU initialization failed: ${gpuError.message}. Falling back to CPU execution...`);
    session = await ort.InferenceSession.create(buffer, { executionProviders: ['wasm'] });
  }
  
  inputName = session.inputNames[0];
  outputName = session.outputNames[0];
  log(`Model loaded. Input layer: "${inputName}" | Output layer: "${outputName}"`);
  
  detected = await detectModelShape(session, inputName);
  if(detected.layout){
    modelStatus.innerHTML = `Loaded: <b>${name}</b> <span class="badge">${detected.layout} ${detected.size}x${detected.size}</span>`;
  } else {
    modelStatus.innerHTML = `Loaded: <b>${name}</b> <span class="badge">Dynamic Engine</span>`;
  }
  maybeEnableRun();
}

// ---- Media Sourcing Handlers ----
btnPickPhoto.addEventListener('click', () => imageFile.click());
imageFile.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = () => {
    currentImageEl = img;
    drawToCanvas(img, inCanvas);
    log(`Target image uploaded: ${img.width}x${img.height}`);
    maybeEnableRun();
  };
  img.src = URL.createObjectURL(file);
  video.style.display = 'none';
  btnSnap.style.display = 'none';
});

btnCamera.addEventListener('click', async () => {
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
    video.style.display = 'block';
    btnSnap.style.display = 'block';
    log('Camera subsystem active.');
  }catch(err){
    log('Camera access failed: ' + err.message);
  }
});

btnSnap.addEventListener('click', () => {
  const tmp = document.createElement('canvas');
  tmp.width = video.videoWidth;
  tmp.height = video.videoHeight;
  tmp.getContext('2d').drawImage(video, 0, 0);
  const img = new Image();
  img.onload = () => {
    currentImageEl = img;
    drawToCanvas(img, inCanvas);
    log(`Snapped viewport matrix frame.`);
    maybeEnableRun();
  };
  img.src = tmp.toDataURL('image/png');
  video.srcObject.getTracks().forEach(t => t.stop());
  video.style.display = 'none';
  btnSnap.style.display = 'none';
});

function drawToCanvas(img, canvas){
  const maxW = 400;
  const scale = Math.min(1, maxW / img.width);
  canvas.width = img.width * scale;
  canvas.height = img.height * scale;
  canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
}

// ---- Data Processing Operations ----
function imageToTensorNHWC(img, size){
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);
  const data = ctx.getImageData(0, 0, size, size).data; 
  const out = new Float32Array(size * size * 3);
  for(let i = 0, j = 0; i < data.length; i += 4, j += 3){
    out[j]   = (data[i]   / 127.5) - 1.0; 
    out[j+1] = (data[i+1] / 127.5) - 1.0; 
    out[j+2] = (data[i+2] / 127.5) - 1.0; 
  }
  return new ort.Tensor('float32', out, [1, size, size, 3]);
}

function imageToTensorNCHW(img, size){
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);
  const data = ctx.getImageData(0, 0, size, size).data;
  const out = new Float32Array(3 * size * size);
  const plane = size * size;
  for(let p = 0, i = 0; p < plane; p++, i += 4){
    out[p]           = (data[i]   / 127.5) - 1.0; 
    out[p + plane]   = (data[i+1] / 127.5) - 1.0; 
    out[p + 2*plane] = (data[i+2] / 127.5) - 1.0; 
  }
  return new ort.Tensor('float32', out, [1, 3, size, size]);
}

function tensorToCanvasNHWC(tensor, canvas){
  const [_, h, w, c] = tensor.dims;
  const data = tensor.data;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(w, h);
  for(let i = 0, j = 0; i < imgData.data.length; i += 4, j += 3){
    imgData.data[i]   = clamp255((data[j]   + 1) * 127.5);
    imgData.data[i+1] = clamp255((data[j+1] + 1) * 127.5);
    imgData.data[i+2] = clamp255((data[j+2] + 1) * 127.5);
    imgData.data[i+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
}

function tensorToCanvasNCHW(tensor, canvas){
  const [_, c, h, w] = tensor.dims;
  const data = tensor.data;
  const plane = h * w;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(w, h);
  for(let p = 0, i = 0; p < plane; p++, i += 4){
    imgData.data[i]   = clamp255((data[p]           + 1) * 127.5);
    imgData.data[i+1] = clamp255((data[p + plane]   + 1) * 127.5);
    imgData.data[i+2] = clamp255((data[p + 2*plane] + 1) * 127.5);
    imgData.data[i+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
}

function clamp255(v){ return Math.max(0, Math.min(255, v)); }

// ---- Core Execution Loop ----
btnRun.addEventListener('click', async () => {
  if(!session || !currentImageEl) return;
  btnRun.disabled = true;
  runStatus.textContent = 'Processing frame elements...';
  const sizeChoice = sizeSelect.value;
  const size = sizeChoice === 'auto' ? (detected.size || 512) : parseInt(sizeChoice, 10);
  const t0 = performance.now();

  let attempts = [
    { name: 'NCHW', build: () => imageToTensorNCHW(currentImageEl, size), draw: tensorToCanvasNCHW },
    { name: 'NHWC', build: () => imageToTensorNHWC(currentImageEl, size), draw: tensorToCanvasNHWC }
  ];

  if(sizeChoice === 'auto' && detected.layout){
    attempts = detected.layout === 'NCHW' ? [attempts[0]] : [attempts[1]];
  }

  let success = false;
  for(const attempt of attempts){
    try{
      log(`Running transformation pipeline via (${attempt.name})...`);
      const tensor = attempt.build();
      const feeds = { [inputName]: tensor };
      const results = await session.run(feeds);
      const outTensor = results[outputName];
      attempt.draw(outTensor, outCanvas);
      const t1 = performance.now();
      runStatus.innerHTML = `<span class="pill ok">Rendered in ${((t1-t0)/1000).toFixed(2)}s</span>`;
      success = true;
      break;
    }catch(err){
      log(`Execution variant ${attempt.name} rejected: ${err.message}`);
    }
  }

  if(!success){
    runStatus.innerHTML = `<span class="pill err">Inference error. See log parameters.</span>`;
  }
  btnRun.disabled = false;
});

log('System ready.');
</script>
</body>
</html>
