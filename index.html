<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AnimeGANv2 Mobile Tester</title>
<style>
  :root{color-scheme:dark;}
  *{box-sizing:border-box;}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#0f1115;color:#e8e8ec;padding:14px;padding-bottom:60px;
  }
  h1{font-size:18px;margin:0 0 4px;}
  p.sub{color:#9a9aa5;font-size:13px;margin:0 0 16px;}
  .card{
    background:#181b22;border:1px solid #262a33;border-radius:14px;
    padding:14px;margin-bottom:14px;
  }
  label{display:block;font-size:13px;color:#b6b6c0;margin-bottom:6px;font-weight:600;}
  input[type=file]{
    width:100%;font-size:13px;color:#cfcfd6;
  }
  select{
    width:100%;padding:10px;border-radius:10px;background:#11131a;color:#fff;
    border:1px solid #2c303a;font-size:15px;
  }
  button{
    width:100%;padding:13px;border:none;border-radius:12px;
    font-size:15px;font-weight:700;margin-top:10px;cursor:pointer;
  }
  .btn-primary{background:#5b8def;color:#fff;}
  .btn-primary:disabled{background:#2c303a;color:#777;}
  .btn-secondary{background:#262a33;color:#e8e8ec;}
  .row{display:flex;gap:10px;}
  .row>div{flex:1;}
  .imgwrap{
    display:flex;gap:10px;flex-wrap:wrap;margin-top:12px;
  }
  .imgbox{flex:1;min-width:140px;}
  .imgbox span{display:block;font-size:11px;color:#9a9aa5;margin-bottom:4px;}
  .imgbox canvas, .imgbox img, .imgbox video{
    width:100%;border-radius:10px;background:#000;display:block;
  }
  #log{
    background:#0b0c10;border:1px solid #262a33;border-radius:10px;
    padding:10px;font-family:ui-monospace,Menlo,monospace;font-size:11px;
    color:#8fd19e;white-space:pre-wrap;max-height:160px;overflow-y:auto;
  }
  .status{font-size:12px;color:#f0c674;margin-top:8px;min-height:16px;}
  .badge{
    display:inline-block;background:#262a33;color:#9a9aa5;font-size:11px;
    padding:3px 8px;border-radius:6px;margin-left:6px;
  }
  .pill{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;margin-right:6px;margin-top:6px;}
  .ok{background:#1d3a2a;color:#7fdb9a;}
  .err{background:#3a1d1d;color:#db7f7f;}
</style>
</head>
<body>

<h1>🎨 AnimeGANv2 Mobile Tester</h1>
<p class="sub">Single-file, no install. Pick a model + image/camera, run inference on-device.</p>

<div class="card">
  <label>1. Load ONNX model (from phone storage)</label>
  <input type="file" id="modelFile" accept=".onnx">
  <div class="status" id="modelStatus">No model loaded yet.</div>
</div>

<div class="card">
  <label>2. Input image</label>
  <div class="row">
    <div><button class="btn-secondary" id="btnCamera">📷 Use Camera</button></div>
    <div><input type="file" id="imageFile" accept="image/*" style="display:none" capture="environment"></div>
  </div>
  <button class="btn-secondary" id="btnPickPhoto">🖼️ Pick Photo from Gallery</button>
  <video id="video" autoplay playsinline style="width:100%;border-radius:10px;margin-top:10px;display:none;"></video>
  <button class="btn-secondary" id="btnSnap" style="display:none;">Capture Frame</button>
</div>

<div class="card">
  <label>3. Inference settings</label>
  <select id="sizeSelect">
    <option value="auto" selected>Auto-detect from model</option>
    <option value="256">256 x 256 (force)</option>
    <option value="384">384 x 384 (force)</option>
    <option value="512">512 x 512 (force)</option>
  </select>
  <button class="btn-primary" id="btnRun" disabled>▶ Run Inference</button>
  <div class="status" id="runStatus"></div>
</div>

<div class="card">
  <label>Result</label>
  <div class="imgwrap">
    <div class="imgbox">
      <span>Input</span>
      <canvas id="inCanvas"></canvas>
    </div>
    <div class="imgbox">
      <span>Output</span>
      <canvas id="outCanvas"></canvas>
    </div>
  </div>
</div>

<div class="card">
  <label>Debug Log</label>
  <div id="log">Waiting...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
<script>
const logEl = document.getElementById('log');
function log(msg){
  const t = new Date().toLocaleTimeString();
  logEl.textContent += `\n[${t}] ${msg}`;
  logEl.scrollTop = logEl.scrollHeight;
  console.log(msg);
}

// Force WASM backend - most reliable across mobile browsers for custom ops
ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/";
ort.env.wasm.numThreads = 1; // single-thread = safest on mobile (no SharedArrayBuffer/COOP-COEP needed)

let session = null;
let inputName = null;
let outputName = null;
let currentImageEl = null; // an <img> or <video> frame source
let detected = { layout: null, size: null }; // auto-detected from model

async function detectModelShape(session, inputName){
  // Probe with a tiny dummy NCHW tensor; if the model has a fixed shape,
  // ORT throws an error that tells us the exact expected dims.
  try{
    const dummy = new ort.Tensor('float32', new Float32Array(1*3*64*64), [1,3,64,64]);
    await session.run({ [inputName]: dummy });
    log('Model accepted dynamic 64x64 probe — input shape is likely dynamic.');
    return { layout: null, size: null };
  }catch(err){
    const matches = [...err.message.matchAll(/index:\s*(\d+)\s*Got:\s*\d+\s*Expected:\s*(\d+)/g)];
    if(matches.length === 0){
      log('Could not parse expected shape from probe error: ' + err.message);
      return { layout: null, size: null };
    }
    const expected = {};
    for(const m of matches){ expected[parseInt(m[1])] = parseInt(m[2]); }
    log('Probe revealed expected dims: ' + JSON.stringify(expected));
    if(expected[1] === 3){
      return { layout: 'NCHW', size: expected[2] || expected[3] };
    } else if(expected[3] === 3){
      return { layout: 'NHWC', size: expected[1] || expected[2] };
    }
    return { layout: null, size: null };
  }
}

const modelFile = document.getElementById('modelFile');
const modelStatus = document.getElementById('modelStatus');
const imageFile = document.getElementById('imageFile');
const btnPickPhoto = document.getElementById('btnPickPhoto');
const btnCamera = document.getElementById('btnCamera');
const btnSnap = document.getElementById('btnSnap');
const video = document.getElementById('video');
const inCanvas = document.getElementById('inCanvas');
const outCanvas = document.getElementById('outCanvas');
const btnRun = document.getElementById('btnRun');
const runStatus = document.getElementById('runStatus');
const sizeSelect = document.getElementById('sizeSelect');

function maybeEnableRun(){
  btnRun.disabled = !(session && currentImageEl);
}

// ---- Load model ----
modelFile.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file) return;
  modelStatus.textContent = `Loading ${file.name} ...`;
  log(`Reading model file: ${file.name} (${(file.size/1024/1024).toFixed(1)} MB)`);
  try{
    const buf = await file.arrayBuffer();
    log('Creating inference session (wasm backend)...');
    session = await ort.InferenceSession.create(buf, { executionProviders: ['wasm'] });
    inputName = session.inputNames[0];
    outputName = session.outputNames[0];
    log(`Model ready. inputs=[${session.inputNames.join(',')}] outputs=[${session.outputNames.join(',')}]`);
    log('Probing for fixed input shape...');
    detected = await detectModelShape(session, inputName);
    if(detected.layout){
      modelStatus.innerHTML = `Loaded: <b>${file.name}</b> <span class="badge">${detected.layout} ${detected.size}x${detected.size}</span>`;
      log(`Detected fixed shape: ${detected.layout} @ ${detected.size}px`);
    } else {
      modelStatus.innerHTML = `Loaded: <b>${file.name}</b> <span class="badge">dynamic shape</span>`;
    }
    maybeEnableRun();
  }catch(err){
    modelStatus.textContent = 'Failed to load model. See log.';
    log('ERROR loading model: ' + err.message);
  }
});

// ---- Photo picker ----
btnPickPhoto.addEventListener('click', () => imageFile.click());
imageFile.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if(!file) return;
  const img = new Image();
  img.onload = () => {
    currentImageEl = img;
    drawToCanvas(img, inCanvas);
    log(`Loaded photo ${img.width}x${img.height}`);
    maybeEnableRun();
  };
  img.src = URL.createObjectURL(file);
  video.style.display = 'none';
  btnSnap.style.display = 'none';
});

// ---- Camera ----
btnCamera.addEventListener('click', async () => {
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    video.srcObject = stream;
    video.style.display = 'block';
    btnSnap.style.display = 'block';
    log('Camera stream started.');
  }catch(err){
    log('Camera error: ' + err.message + ' (needs HTTPS + permission)');
    alert('Camera failed: ' + err.message);
  }
});

btnSnap.addEventListener('click', () => {
  const tmp = document.createElement('canvas');
  tmp.width = video.videoWidth;
  tmp.height = video.videoHeight;
  tmp.getContext('2d').drawImage(video, 0, 0);
  const img = new Image();
  img.onload = () => {
    currentImageEl = img;
    drawToCanvas(img, inCanvas);
    log(`Captured frame ${img.width}x${img.height}`);
    maybeEnableRun();
  };
  img.src = tmp.toDataURL('image/png');
  video.srcObject.getTracks().forEach(t => t.stop());
  video.style.display = 'none';
  btnSnap.style.display = 'none';
});

function drawToCanvas(img, canvas){
  const maxW = 400;
  const scale = Math.min(1, maxW / img.width);
  canvas.width = img.width * scale;
  canvas.height = img.height * scale;
  canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
}

// ---- Preprocessing helpers ----
// AnimeGANv2 (akhaliq onnx port) expects NHWC float32, range [-1,1], RGB.
function imageToTensorNHWC(img, size){
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);
  const data = ctx.getImageData(0, 0, size, size).data; // RGBA, size*size*4
  const out = new Float32Array(size * size * 3);
  for(let i = 0, j = 0; i < data.length; i += 4, j += 3){
    out[j]   = (data[i]   / 127.5) - 1.0; // R
    out[j+1] = (data[i+1] / 127.5) - 1.0; // G
    out[j+2] = (data[i+2] / 127.5) - 1.0; // B
  }
  return new ort.Tensor('float32', out, [1, size, size, 3]);
}

function imageToTensorNCHW(img, size){
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, size, size);
  const data = ctx.getImageData(0, 0, size, size).data;
  const out = new Float32Array(3 * size * size);
  const plane = size * size;
  for(let p = 0, i = 0; p < plane; p++, i += 4){
    out[p]           = (data[i]   / 127.5) - 1.0; // R plane
    out[p + plane]   = (data[i+1] / 127.5) - 1.0; // G plane
    out[p + 2*plane] = (data[i+2] / 127.5) - 1.0; // B plane
  }
  return new ort.Tensor('float32', out, [1, 3, size, size]);
}

function tensorToCanvasNHWC(tensor, canvas){
  const [_, h, w, c] = tensor.dims;
  const data = tensor.data;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(w, h);
  for(let i = 0, j = 0; i < imgData.data.length; i += 4, j += 3){
    imgData.data[i]   = clamp255((data[j]   + 1) * 127.5);
    imgData.data[i+1] = clamp255((data[j+1] + 1) * 127.5);
    imgData.data[i+2] = clamp255((data[j+2] + 1) * 127.5);
    imgData.data[i+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
}

function tensorToCanvasNCHW(tensor, canvas){
  const [_, c, h, w] = tensor.dims;
  const data = tensor.data;
  const plane = h * w;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(w, h);
  for(let p = 0, i = 0; p < plane; p++, i += 4){
    imgData.data[i]   = clamp255((data[p]           + 1) * 127.5);
    imgData.data[i+1] = clamp255((data[p + plane]   + 1) * 127.5);
    imgData.data[i+2] = clamp255((data[p + 2*plane] + 1) * 127.5);
    imgData.data[i+3] = 255;
  }
  ctx.putImageData(imgData, 0, 0);
}

function clamp255(v){ return Math.max(0, Math.min(255, v)); }

// ---- Run inference, trying NHWC then NCHW ----
btnRun.addEventListener('click', async () => {
  if(!session || !currentImageEl) return;
  btnRun.disabled = true;
  runStatus.textContent = 'Running inference...';
  const sizeChoice = sizeSelect.value;
  const size = sizeChoice === 'auto' ? (detected.size || 384) : parseInt(sizeChoice, 10);
  const t0 = performance.now();

  let attempts;
  if(sizeChoice === 'auto' && detected.layout){
    // We know the exact required layout — only try that one, in correct order.
    attempts = detected.layout === 'NCHW'
      ? [{ name: 'NCHW (detected)', build: () => imageToTensorNCHW(currentImageEl, size), draw: tensorToCanvasNCHW }]
      : [{ name: 'NHWC (detected)', build: () => imageToTensorNHWC(currentImageEl, size), draw: tensorToCanvasNHWC }];
  } else {
    attempts = [
      { name: 'NCHW', build: () => imageToTensorNCHW(currentImageEl, size), draw: tensorToCanvasNCHW },
      { name: 'NHWC', build: () => imageToTensorNHWC(currentImageEl, size), draw: tensorToCanvasNHWC },
    ];
  }

  let success = false;
  for(const attempt of attempts){
    try{
      log(`Trying layout ${attempt.name} at ${size}x${size}...`);
      const tensor = attempt.build();
      const feeds = { [inputName]: tensor };
      const results = await session.run(feeds);
      const outTensor = results[outputName];
      log(`Success with ${attempt.name}. Output dims: [${outTensor.dims.join(',')}]`);
      attempt.draw(outTensor, outCanvas);
      const t1 = performance.now();
      runStatus.innerHTML = `<span class="pill ok">Done in ${((t1-t0)/1000).toFixed(2)}s (${attempt.name})</span>`;
      success = true;
      break;
    }catch(err){
      log(`Layout ${attempt.name} failed: ${err.message}`);
    }
  }

  if(!success){
    runStatus.innerHTML = `<span class="pill err">Both layouts failed — check log</span>`;
  }
  btnRun.disabled = false;
});

log('App ready. Load a model and an image to begin.');
log('Tip: if both NHWC/NCHW fail, the model likely uses a different input name/shape — check the log for actual dims and tell Claude.');
</script>
</body>
</html>
